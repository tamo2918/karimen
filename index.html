<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>仮免まるばつ復習クイズ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main class="app">
      <aside class="dashboard" aria-label="復習ダッシュボード">
        <section class="panel intro-panel">
          <p class="eyebrow">KARI-MEN REVIEW</p>
          <h1>仮免<br />Revision</h1>
          <p class="subtitle">
            前回の結果をもとに、苦手問題を静かに潰していくための復習モード。
          </p>
        </section>

        <section class="panel metrics-panel">
          <div class="section-head">
            <p class="section-label">Dashboard</p>
            <h2>Progress & Score</h2>
          </div>
          <div class="stat-grid">
            <article class="stat-card">
              <span>収録問題</span>
              <strong id="stat-total">0</strong>
            </article>
            <article class="stat-card">
              <span>前回の正答率</span>
              <strong id="stat-prev-accuracy">0%</strong>
            </article>
            <article class="stat-card">
              <span>前回のミス数</span>
              <strong id="stat-prev-missed">0</strong>
            </article>
            <article class="stat-card">
              <span>今回の正答率</span>
              <strong id="stat-session-accuracy">0%</strong>
            </article>
          </div>
        </section>

        <section class="panel control-panel">
          <div class="section-head">
            <p class="section-label">Mode</p>
            <h2>出題フィルター</h2>
          </div>
          <div class="mode-switch" role="tablist" aria-label="出題モード">
            <button class="mode-btn is-active" data-mode="all">全問題</button>
            <button class="mode-btn" data-mode="missed">前回ミスのみ</button>
            <button class="mode-btn" data-mode="random">ランダム</button>
          </div>
          <div class="progress-wrap">
            <p id="progress-label">問題 1 / 1</p>
            <div class="progress-track" aria-hidden="true">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
          </div>
        </section>

        <section class="panel review-panel">
          <div class="section-head">
            <p class="section-label">Missed Jump</p>
            <h2>前回ミスした問題</h2>
          </div>
          <p id="missed-count" class="review-note"></p>
          <div id="missed-list" class="missed-list"></div>
        </section>
      </aside>

      <section class="stage" aria-label="クイズ問題">
        <div class="stage-head">
          <div class="stage-counter">
            <span class="stage-ring" aria-hidden="true"></span>
            <p id="question-count">01 / 01</p>
          </div>
          <div class="stage-nav">
            <button id="prev-btn" class="nav-btn" aria-label="前の問題">
              &larr;
            </button>
            <button id="next-btn" class="nav-btn" aria-label="次の問題">
              &rarr;
            </button>
          </div>
        </div>

        <div class="card-stack">
          <section id="quiz-card" class="question-card">
            <div class="question-top">
              <p class="card-tag">READY TO REVIEW_</p>
              <div class="pill-group">
                <span id="source-no" class="pill"></span>
                <span id="previous-result" class="pill"></span>
              </div>
            </div>

            <h2 id="question-text" class="question-text"></h2>

            <div class="answer-meta">
              <article class="meta-card">
                <span class="meta-label">前回の回答</span>
                <strong id="your-answer">-</strong>
              </article>
              <article class="meta-card">
                <span class="meta-label">正解</span>
                <strong id="correct-answer">-</strong>
              </article>
            </div>

            <div class="answer-buttons">
              <button id="btn-o" class="answer-btn" aria-label="○で回答">
                <span class="answer-symbol">○</span>
                <span class="answer-word">MARU</span>
              </button>
              <button id="btn-x" class="answer-btn" aria-label="×で回答">
                <span class="answer-symbol">×</span>
                <span class="answer-word">BATSU</span>
              </button>
            </div>

            <section id="feedback" class="feedback hidden" aria-live="polite">
              <p id="feedback-title" class="feedback-title"></p>
              <p id="feedback-text" class="feedback-text"></p>
              <p class="feedback-label">解説</p>
              <p id="explanation" class="explanation"></p>
            </section>

            <p class="terminal-note">&gt; KEEP THE RULES SHARP _</p>
          </section>
        </div>
      </section>
    </main>

    <script src="./questions.js?v=__ASSET_VERSION__"></script>
    <script src="./questions-extra.js?v=__ASSET_VERSION__"></script>
    <script src="./app.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
