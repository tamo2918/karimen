<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>仮免まるばつ復習クイズ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="クイズ問題">
        <div class="stage-head">
          <div class="stage-counter">
            <span id="stage-ring" class="stage-ring" aria-hidden="true"></span>
            <div class="stage-copy">
              <p class="eyebrow">KARI-MEN RANDOM QUIZ</p>
              <p id="question-count" class="stage-count">01 / 01</p>
            </div>
          </div>
        </div>

        <div class="card-stack">
          <section id="quiz-card" class="question-card">
            <section id="question-view" class="question-view">
              <h1 id="question-text" class="question-text"></h1>
              <p class="helper-copy">○か×を選ぶと正誤と解説を確認できます。</p>

              <div class="answer-buttons">
                <button id="btn-o" class="answer-btn" aria-label="○で回答">
                  <span class="answer-symbol">○</span>
                  <span class="answer-word">MARU</span>
                </button>
                <button id="btn-x" class="answer-btn" aria-label="×で回答">
                  <span class="answer-symbol">×</span>
                  <span class="answer-word">BATSU</span>
                </button>
              </div>

              <section id="feedback" class="feedback hidden" aria-live="polite">
                <p id="feedback-title" class="feedback-title"></p>
                <div class="feedback-grid">
                  <article class="feedback-card">
                    <span class="feedback-card-label">あなたの回答</span>
                    <strong id="session-answer">-</strong>
                  </article>
                  <article class="feedback-card">
                    <span class="feedback-card-label">正解</span>
                    <strong id="correct-answer">-</strong>
                  </article>
                </div>
                <p id="feedback-text" class="feedback-text"></p>
                <p class="feedback-label">解説</p>
                <p id="explanation" class="explanation"></p>
              </section>

              <div class="question-actions">
                <button id="next-btn" class="next-btn hidden" aria-label="次の問題へ進む">
                  次へ
                </button>
              </div>
            </section>

            <section id="result-view" class="result-view hidden" aria-live="polite">
              <p class="result-kicker">Quiz Result</p>
              <h2 id="result-title" class="result-title">100問完了</h2>
              <div class="summary-grid">
                <article class="summary-card">
                  <span class="summary-label">解いた問題</span>
                  <strong id="result-total">0</strong>
                </article>
                <article class="summary-card">
                  <span class="summary-label">正解数</span>
                  <strong id="result-correct">0</strong>
                </article>
                <article class="summary-card">
                  <span class="summary-label">正答率</span>
                  <strong id="result-accuracy">0%</strong>
                </article>
              </div>

              <p id="result-message" class="result-message"></p>

              <section id="review-section" class="review-section hidden">
                <h3 class="review-title">復習したい問題</h3>
                <div id="review-list" class="review-list"></div>
              </section>

              <div class="result-actions">
                <button id="restart-btn" class="restart-btn" aria-label="もう一度ランダムで解く">
                  もう一度ランダムで解く
                </button>
              </div>
            </section>
          </section>
        </div>
      </section>
    </main>

    <script src="./questions.js?v=__ASSET_VERSION__"></script>
    <script src="./questions-extra.js?v=__ASSET_VERSION__"></script>
    <script src="./app.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
